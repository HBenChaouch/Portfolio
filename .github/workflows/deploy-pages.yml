name: Deploy finance portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pinned Real Estate cockpit
        uses: actions/checkout@v4
        with:
          repository: HBenChaouch/cockpit-fund-controlling
          ref: 1af4a9be502c00447a392dc333376e082001a786
          path: .cockpit-source
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Financial and workbook checks
        run: npm run test:audit
      - name: Static web quality checks
        run: npm run test:web
      - name: Navigation logic checks
        run: npm run test:navigation
      - name: Bilingual architecture checks
        run: npm run test:i18n
      - name: Build auditable site
        run: npm run build
      - name: Real Estate integration checks
        run: npm run test:real-estate
      - name: Browser navigation and responsive checks
        run: npm run test:navigation:browser
      - name: Stamp exact commit
        shell: pwsh
        run: |
          @{ commit = "${{ github.sha }}" } | ConvertTo-Json | Set-Content public/deployment.json
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy exact build artifact
        id: deployment
        uses: actions/deploy-pages@v4
